            <style>
                body {
                    font-family: Garamond, "Times New Roman", serif;
                    color:#FFFCE5;
                    background-color:#083556;
                    font-size: 20px;
                }
                p {
                   text-align: justify;
                }
                p.author {
                    font-size: 105%;
                    text-align: right;
                    margin-top: -1%;
                }
                p.quote {
                    font-size: 125%;
                    font-family: 'Cedarville Cursive', cursive;
                    padding: 0px;
                }
                a {
                    text-decoration: none;
                    color: goldenrod;
                }
                /* made with help from gemini */
                .container {
                    color: goldenrod;
                    font-weight: bold;
                    border-bottom: 1px dashed goldenrod;
                    position: relative;
                    display: inline-block;
                    cursor: pointer;
                }
                .container .card {
                    font-size: 16px;
                    font-weight: normal;
                    visibility: hidden;
                    width: 220px;
                    background-color: #333;
                    color: #fff;
                    text-align: center;
                    border-radius: 8px;
                    padding: 10px;
                    position: absolute;
                    z-index: 1;
                    bottom: 125%; 
                    left: 50%;
                    transform: translateX(-50%);
                    opacity: 0;
                    transition: opacity 0.3s;
                }
                .card img {
                    width: 100%; 
                    height: auto;   
                    border-radius: 4px; 
                    margin-bottom: 5px;
                }
                .container:hover .card {
                    visibility: visible;
                    opacity: 1;
                }
                .container .card::after {
                    content: "";
                    position: absolute;
                    top: 100%; 
                    left: 50%;
                    margin-left: -5px;
                    border-width: 5px;
                    border-style: solid;
                    border-color: #333333;
                }
                .app-container {
                    display: flex;
                    width: 100%;
                    min-width: 1200px;
                    min-height: 100vh;
                }
                .sidebar {
                    width: 250px;
                    flex-shrink: 0;
                    background-color: #02213d50;
                    padding-top: 20px;
                    position: sticky;        
                    top: 0;
                    height: 100vh; 
                    overflow-y: auto;   
                    align-items: center; 
                    gap: 8px;     
                }
                .sidebar a {
                    display: grid;
                    color:white;
                    grid-template-columns: 24px 1fr; 
                    align-items: center;
                    gap: 6px;
                    padding: 14px 20px;
                }
                .sidebar a:hover {
                    background-color: #34495e;
                }
                .sidebar a.active {
                    background-color: #3498db;
                    color: white;
                }
                .content {
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    flex-grow: 1;
                    padding: 40px;
                }
                .sticky-header {
                    position: sticky;
                    top: 0;
                    padding: 20px 0;
                    margin-top: 0;
                    z-index: 10;
                    border-bottom: 2px solid #dee2e6;
                }
                /* ai ends here*/
                /* more help here*/
                .card {
                    display: flex;
                    flex-direction: column;
                    align-items: center; 
                    justify-content: center;
                    text-align: center;
                    padding: 30px;
                    background: #002244; 
                    border-radius: 15px;
                    max-width: 500px; 
                    margin: 0 auto;   
                }
                #fact-display {
                    font-size: 1.2rem;
                    margin: 20px 0;
                    min-height: 60px;
                    color: #e0e0ff;
                    text-align: center;
                }
                button {
                    color: #042238;
                    border: none;
                    padding: 12px 24px;
                    font-size: 1rem;
                    font-weight: bold;
                    border-radius: 25px;
                    cursor: pointer;
                    transition: transform 0.2s, box-shadow 0.2s;
                }
                button:hover {
                    transform: scale(1.05);
                    box-shadow: 0 0 15px rgb(218, 165, 32, 1.0)
                }
                button:active {
                    transform: scale(0.95);
                }
                /* ai ends here*/
                h2 {
                    text-align: center;
                }
                li {
                    font-size: 90%;
                }
            .nav-icon {
                    display: inline-block;
                    vertical-align: middle;
                    fill: white;
                    width: 18px;
                    height: 18px;
                }
                .side-icon {
                width: 18px;
                height: 18px;
                display: block;
                }
            </style>
        </head>
